<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processando Autenticação - Check-in System</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="images/hpsm_favicon.png">
    <style>
        .callback-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .callback-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .callback-title {
            color: #333;
            margin-bottom: 1rem;
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .callback-message {
            color: #666;
            margin-bottom: 1rem;
            line-height: 1.5;
        }
        
        .error-message {
            color: #e74c3c;
            background: #fdf2f2;
            padding: 1rem;
            border-radius: 8px;
            border-left: 4px solid #e74c3c;
            margin-top: 1rem;
        }
        
        .retry-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
            transition: background 0.3s ease;
        }
        
        .retry-button:hover {
            background: #5a6fd8;
        }
    </style>
</head>
<body>
    <div class="callback-container">
        <div class="callback-card">
            <div class="loading-spinner"></div>
            <h1 class="callback-title">Processando Autenticação</h1>
            <p class="callback-message">
                Estamos processando sua autenticação com o ClickUp...
            </p>
            <div id="error-container" style="display: none;">
                <div class="error-message" id="error-message">
                    Ocorreu um erro durante a autenticação.
                </div>
                <button class="retry-button" onclick="retryAuth()">
                    Tentar Novamente
                </button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script>
        // Função para mostrar erro
        function showError(message) {
            document.getElementById('error-message').textContent = message;
            document.getElementById('error-container').style.display = 'block';
            document.querySelector('.loading-spinner').style.display = 'none';
        }
        
        // Função para tentar novamente
        function retryAuth() {
            window.location.href = '/';
        }
        
        // Sobrescrever a função showErrorModal para esta página
        window.showErrorModal = function(message) {
            showError(message);
        };
        
        // Processar callback automaticamente quando a página carregar
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🔄 Página de callback carregada');
            // O processamento será feito automaticamente pelo auth.js
        });
    </script>
</body>
</html>
